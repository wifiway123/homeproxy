name: "Build HomeProxy - Daily Overwrite"

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: '是否强制重新编译'
        required: false
        default: 'true'
        type: boolean
  push:
    branches: [ master, main ]
    paths:
      - 'htdocs/**'
      - 'po/**'
      - 'root/**'
      - 'Makefile'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v4

      - name: Setup Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev lua5.1 gettext fakeroot
          
          git clone --depth 1 https://github.com/openwrt/luci.git
          pushd luci/modules/luci-base/src
          make po2lmo
          sudo install -m0755 po2lmo /usr/local/bin/po2lmo
          popd

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build"
          chmod +x ipkg-build
          sudo mv ipkg-build /usr/local/bin/ipkg-build

      - name: Build IPK
        run: |
          # 1. 生成日期标识 (仅 MMDD)
          SHORT_DATE=$(date +'%m%d')
          # 生成详细时间戳用于内部版本号识别
          FULL_TIME=$(date +'%m%d%H%M')
          echo "SHORT_DATE=$SHORT_DATE" >> $GITHUB_ENV
          
          rm -rf ipk_root
          mkdir -p ipk_root/CONTROL
          
          [ -d root ] && cp -r root/* ipk_root/
          [ -d htdocs ] && mkdir -p ipk_root/www && cp -r htdocs/* ipk_root/www/
          
          if [ -d po ]; then
            mkdir -p ipk_root/usr/lib/lua/luci/i18n
            find po -name "*.po" | while read po_file; do
              lang=$(basename $(dirname "$po_file") | tr 'A-Z' 'a-z')
              po2lmo "$po_file" "ipk_root/usr/lib/lua/luci/i18n/homeproxy.$lang.lmo"
            done
          fi

          # 2. 写入控制信息
          cat > ipk_root/CONTROL/control <<EOF
          Package: luci-app-homeproxy
          Version: 1.0-${FULL_TIME}
          Architecture: all
          Maintainer: GitHub-Actions
          Depends: libc, luci-base, luci-compat, xray-core, sing-box
          Description: HomeProxy for OpenWrt 23.05 (Built on ${SHORT_DATE})
          EOF

          fakeroot ipkg-build ipk_root .
          
          # 3. 固定文件名（同一天内运行会产生相同文件名，从而触发覆盖）
          NEW_FILE="${SHORT_DATE}_luci-app-homeproxy_2305.ipk"
          mv luci-app-homeproxy*.ipk "$NEW_FILE"
          
          echo "IPK_FILE=$NEW_FILE" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IPK_FILE }}
          tag_name: build-${{ env.SHORT_DATE }}
          name: "HomeProxy 23.05 发布 - ${{ env.SHORT_DATE }}"
          # 【核心修改】：手动定义 body 并关闭自动生成的 Changelog
          body: "编译完成。此版本为针对 OpenWrt 23.05 的适配版本。"
          generate_release_notes: false
          overwrite: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
